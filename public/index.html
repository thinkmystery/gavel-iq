<style>
:root{--bg:#05070a;--panel:#0b1117;--panel2:#101923;--border:#1f2b38;--text:#e6edf3;--muted:#8fa0b5;--accent:#ff8c00;--green:#00c853;--red:#ff5252;--yellow:#ffca28;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;letter-spacing:-0.01em}
.mono{font-family:'IBM Plex Mono',monospace}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border)}
.metric{font-size:clamp(24px,5vw,42px);font-weight:700;letter-spacing:-0.04em;line-height:1}
.badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
input,select{background:#081018;border:1px solid var(--border);color:var(--text);min-height:44px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:#91a3b8;white-space:nowrap}
td{font-size:14px;vertical-align:top}.table-row:hover{background:#131c26}.mobile-card{background:linear-gradient(180deg,#0b1117,#101923);border:1px solid var(--border);border-radius:16px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#7f91a8}.kpi-value{font-size:18px;font-weight:700}
.detail-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.data-tile{background:#081018;border:1px solid var(--border);border-radius:12px;padding:14px}
.timeline-dot{width:9px;height:9px;border-radius:999px;background:var(--accent);margin-top:7px;flex:none}
@media(max-width:767px){.desktop-table{display:none}.desktop-actions{display:none}.hero-title{font-size:42px;line-height:.95}.mobile-sticky{position:sticky;top:0;z-index:20;background:rgba(5,7,10,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);margin-left:-16px;margin-right:-16px;padding:12px 16px}.detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(min-width:768px){.mobile-cards{display:none}.mobile-actions{display:none}}
</style>
</head>

function filteredDeals(){
 const search=(document.getElementById("desktopSearch")?.value||document.getElementById("mobileSearch")?.value||"").toLowerCase();
 const status=document.getElementById("desktopStatus")?.value||document.getElementById("mobileStatus")?.value||"upcoming";
 const alpha=document.getElementById("desktopAlpha")?.value||document.getElementById("mobileAlpha")?.value||"all";
 return deals.filter(d=>`${d.parcel} ${d.address} ${d.behavior} ${d.summary}`.toLowerCase().includes(search)&&
 (status==="all"||(status==="upcoming"&&d.status==="Upcoming")||(status==="canceled"&&d.status.includes("Cancel"))||(status==="sold"&&d.status==="Sold"))&&
 (alpha==="all"||d.alpha===alpha));
}

}

    <div class="data-tile"><div class="kpi-label">Complaint Date</div><div class="font-semibold mt-1">${d.complaint}</div></div>
    <div class="data-tile"><div class="kpi-label">Final Judgment Date</div><div class="font-semibold mt-1">${d.fj}</div></div>
    <div class="data-tile"><div class="kpi-label">FJ Amount</div><div class="font-semibold mt-1">${d.fjAmount}</div></div>
    <div class="data-tile"><div class="kpi-label">Plaintiff</div><div class="font-semibold mt-1">${d.plaintiff}</div></div>
  </div>
  <p class="text-slate-300 leading-7">${d.docketSummary}</p>
 </div>

 <div class="panel rounded-xl p-5">
  <div class="mono text-xs tracking-[0.18em] text-orange-400 mb-4">AI SIGNALS</div>
  <div class="space-y-3">${d.signals.map(s=>`<div class="flex items-center gap-3 p-3 rounded-lg bg-[#081018] border border-[#1f2b38]"><div class="w-2 h-2 rounded-full bg-orange-400"></div><div class="text-sm">${s}</div></div>`).join("")}</div>
 </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
 <div class="panel rounded-xl p-5">
  <div class="mono text-xs tracking-[0.18em] text-orange-400 mb-4">SALE TIMELINE</div>
  <div class="space-y-4">${d.saleHistory.map(s=>`<div class="flex gap-3"><div class="timeline-dot"></div><div><div class="font-semibold">${s[0]} · ${s[1]}</div><div class="text-slate-400 text-sm mt-1">${s[2]}</div></div></div>`).join("")}</div>
 </div>

 <div class="panel rounded-xl p-5">
  <div class="mono text-xs tracking-[0.18em] text-orange-400 mb-4">BANKRUPTCY / STAY SIGNALS</div>
  <div class="space-y-3">${d.bk.map(b=>`<div class="data-tile"><div class="font-semibold text-sm">${b}</div></div>`).join("")}</div>
  <div class="mt-5 pt-5 border-t border-[#1f2b38]">
    <div class="kpi-label">Defendant</div><div class="font-semibold mt-1">${d.defendant}</div>
  </div>
 </div>
</div>
`;
}

function toggleFav(parcel){const d=deals.find(x=>x.parcel===parcel);if(d)d.fav=!d.fav;renderRows()}
function toggleAll(el){document.querySelectorAll(".rowCheck").forEach(c=>c.checked=el.checked)}
function selectedParcels(){return[...document.querySelectorAll(".rowCheck:checked")].map(c=>c.dataset.parcel)}
function exportSelected(){const selected=selectedParcels();if(!selected.length){alert("Select at least one listing first.");return}const rows=deals.filter(d=>selected.includes(d.parcel));const header=["parcel","address","equity","likelihood","friction","behavior","status","summary"];const csv=[header.join(",")].concat(rows.map(d=>header.map(h=>`"${String(d[h]??"").replaceAll('"','""')}"`).join(","))).join("\n");const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gavel-iq-selected.csv";a.click()}
function emailSelected(){const selected=selectedParcels();if(!selected.length){alert("Select at least one listing first.");return}location.href=`mailto:?subject=${encodeURIComponent("Selected Gavel IQ opportunities")}&body=${encodeURIComponent(selected.join("\\n"))}`}
const detail=getDeal(); if(detail) renderDetail(detail); else renderList();
</script>
